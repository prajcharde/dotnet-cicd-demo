name: .NET CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore DotnetCICD/DotnetCICD.sln

    - name: Build
      run: dotnet build DotnetCICD/DotnetCICD.sln --configuration Release

    - name: Test
      run: dotnet test DotnetCICD/DotnetCICD.sln --verbosity normal

    - name: Publish
      run: dotnet publish DotnetCICD/DotnetCICD.csproj -c Release -o publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-api
        path: publish